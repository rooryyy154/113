{% extends 'base.html' %}

{% block title %}
    Ingredient Detail
{% endblock title %}

{% block content %}
    <h1>{{ ingredient.name }}</h1>
    <p>{{ ingredient.description }}</p>
    <a href="{% url 'ingredient_edit' ingredient.id %}" class="btn btn-primary">Edit</a>
    <a href="{% url 'ingredient_delete' ingredient.id %}" class="btn btn-danger">Delete</a>
    <a href="{% url 'ingredient_list' %}" class="btn btn-secondary">Back to list</a>
{% endblock %}
