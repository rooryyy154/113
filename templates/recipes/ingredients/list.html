{% extends 'base.html' %}

{% block title %}
    Ingredients
{% endblock title %}

{% block content %}
    <h1>Ingredients</h1>
    <a href="{% url 'ingredient_new' %}" class="btn btn-success mb-3">New Ingredient</a>
    <ul class="list-group">
        {% for ingredient in ingredients %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            <a href="{% url 'ingredient_detail' ingredient.id %}">{{ ingredient.name }}</a>
            <span>
                <a href="{% url 'ingredient_edit' ingredient.id %}" class="btn btn-sm btn-secondary">Edit</a>
                <a href="{% url 'ingredient_delete' ingredient.id %}" class="btn btn-sm btn-danger">Delete</a>
            </span>
        </li>
        {% empty %}
        <li class="list-group-item">No ingredients yet.</li>
        {% endfor %}
    </ul>
{% endblock %}
