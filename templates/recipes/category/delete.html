{% extends 'base.html' %}

{% block title %}
    Delete Category
{% endblock title %}

{% block content %}
    <h1>Delete Category</h1>
    <p>Are you sure you want to delete <strong>"{{ category.name }}"</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <input type="submit" value="Confirm" class="btn btn-danger">
    </form>
    <a href="{% url 'category_list' %}" class="btn btn-secondary">Cancel</a>
{% endblock %}
