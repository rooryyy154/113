{% extends 'base.html' %}

{% block title %}
    Categories
{% endblock title %}

{% block content %}
    <h1>Categories</h1>
    <a href="{% url 'category_new' %}" class="btn btn-success mb-3">New Category</a>
    <ul class="list-group">
        {% for category in categories %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            <a href="{% url 'category_detail' category.id %}">{{ category.name }}</a>
            <span>
                <a href="{% url 'category_edit' category.id %}" class="btn btn-sm btn-secondary">Edit</a>
                <a href="{% url 'category_delete' category.id %}" class="btn btn-sm btn-danger">Delete</a>
            </span>
        </li>
        {% empty %}
        <li class="list-group-item">No categories yet.</li>
        {% endfor %}
    </ul>
{% endblock %}
