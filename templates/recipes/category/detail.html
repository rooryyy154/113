{% extends 'base.html' %}

{% block title %}
    Category Detail
{% endblock title %}

{% block content %}
    <h1>{{ category.name }}</h1>
    <p>{{ category.description }}</p>
    <a href="{% url 'category_edit' category.id %}" class="btn btn-primary">Edit</a>
    <a href="{% url 'category_delete' category.id %}" class="btn btn-danger">Delete</a>
    <a href="{% url 'category_list' %}" class="btn btn-secondary">Back to list</a>
{% endblock %}
